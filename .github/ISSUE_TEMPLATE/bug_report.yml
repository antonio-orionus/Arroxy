name: Bug Report
description: Something broke?
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Steps to reproduce + what you expected instead.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Click **Logs** in the bottom-right and paste here."
      render: text
