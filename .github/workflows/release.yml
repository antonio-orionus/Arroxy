name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi
          echo "Releasing version $PACKAGE_VERSION"

  build:
    # Windows is built separately by the Windows Installer workflow
    # (.github/workflows/installer-smoke.yml) so it can be smoke-tested
    # before publish. mac/linux still build + publish here via dist:release.
    needs: verify-version
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run dist:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set release title and notes
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ github.ref_name }} --jq .body)
          gh release edit ${{ github.ref_name }} \
            --title ${{ github.ref_name }} \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Wait for Windows artifacts
        # Windows artifacts come from the Windows Installer workflow, which
        # runs in parallel with this one. mac/linux usually finish first;
        # poll until Setup + Portable both land before generating SHA256SUMS,
        # so publish-scoop / publish-homebrew get the Windows hashes they
        # need.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 90); do
            assets=$(gh release view "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --json assets --jq '.assets[].name' 2>/dev/null || echo "")
            if echo "$assets" | grep -q "Arroxy-Setup-.*\.exe$" \
              && echo "$assets" | grep -q "Arroxy-Portable-.*\.exe$"; then
              echo "Windows artifacts present after ${i}0s"
              exit 0
            fi
            echo "Waiting for Windows artifacts (${i}/90)..."
            sleep 10
          done
          echo "::error::Timed out waiting for Windows artifacts after 15 min."
          echo "::error::Check the Windows Installer workflow run for this tag."
          exit 1
      - name: Generate SHA256SUMS
        run: |
          mkdir artifacts
          gh release download ${{ github.ref_name }} \
            --dir artifacts \
            --pattern "*.exe" \
            --pattern "*.dmg" \
            --pattern "*.AppImage" \
            --pattern "*.tar.gz"
          sha256sum artifacts/* > SHA256SUMS
          gh release upload ${{ github.ref_name }} SHA256SUMS --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}

  build-flatpak:
    # Build a Flatpak bundle for the GitHub Release only.
    # This does not publish to Flathub or commit manifest changes back to main.
    needs: finalize
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Render manifest for this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -L --fail \
            "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/SHA256SUMS" \
            -o SHA256SUMS
          TARBALL="Arroxy-${VERSION}.tar.gz"
          HASH=$(grep "$TARBALL" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $TARBALL in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          python3 scripts/render-flatpak-manifest.py \
            --version "$VERSION" \
            --sha256 "$HASH" \
            --template flatpak/io.github.antonio_orionus.Arroxy.yml.in \
            --output flatpak/io.github.antonio_orionus.Arroxy.yml
          rm SHA256SUMS
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: arroxy.flatpak
          manifest-path: flatpak/io.github.antonio_orionus.Arroxy.yml
          cache-key: flatpak-builder-${{ github.sha }}

  upload-flatpak:
    needs: build-flatpak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: arroxy-x86_64.flatpak
          path: flatpak-artifact
      - name: Upload to release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE=$(find flatpak-artifact -name "*.flatpak" -print -quit)
          if [ -z "$FILE" ]; then
            echo "::error::Could not find built .flatpak artifact"
            find flatpak-artifact -maxdepth 3 -type f
            exit 1
          fi
          mv "$FILE" "Arroxy-${VERSION}.flatpak"
          gh release upload "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            "Arroxy-${VERSION}.flatpak" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-scoop:
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4
        with:
          repository: antonio-orionus/scoop-bucket
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PORTABLE="Arroxy-Portable-${VERSION}.exe"
          HASH=$(grep "$PORTABLE" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $PORTABLE in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          jq --arg v "$VERSION" --arg h "$HASH" --arg p "$PORTABLE" \
            '.version = $v
             | .url = "https://github.com/antonio-orionus/Arroxy/releases/download/v\($v)/\($p)"
             | .hash = "sha256:\($h)"
             | .bin = $p
             | .shortcuts = [[$p, "Arroxy"]]' \
            bucket/arroxy.json > bucket/arroxy.json.tmp
          mv bucket/arroxy.json.tmp bucket/arroxy.json
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          git add bucket/arroxy.json
          git commit -m "arroxy: bump to ${GITHUB_REF_NAME#v}"
          git push

  publish-homebrew:
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: antonio-orionus/homebrew-arroxy
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Update cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="Arroxy-${VERSION}.dmg"
          HASH=$(grep "$DMG" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $DMG in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          sed -i -E "s/version \".*\"/version \"$VERSION\"/" Casks/arroxy.rb
          sed -i -E "s/sha256 \".*\"/sha256 \"$HASH\"/" Casks/arroxy.rb
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          git add Casks/arroxy.rb
          git commit -m "arroxy: bump to ${GITHUB_REF_NAME#v}"
          git push
