name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:

  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: gh release create ${{ github.ref_name }} --draft --generate-notes --title ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run dist:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reorder assets and generate SHA256SUMS
        run: |
          mkdir artifacts
          gh release download ${{ github.ref_name }} --dir artifacts
          sha256sum artifacts/*.exe artifacts/*.dmg artifacts/*.AppImage > SHA256SUMS 2>/dev/null || true
          gh release view ${{ github.ref_name }} --json assets --jq '.assets[].name' \
            | while read name; do gh release delete-asset ${{ github.ref_name }} "$name" --yes; done
          for f in \
            artifacts/*Setup*.exe \
            artifacts/*Portable*.exe \
            artifacts/*.dmg \
            artifacts/*.AppImage; do
            [ -f "$f" ] && gh release upload ${{ github.ref_name }} "$f"
          done
          for f in artifacts/*.blockmap artifacts/*.yml; do
            [ -f "$f" ] && gh release upload ${{ github.ref_name }} "$f"
          done
          gh release upload ${{ github.ref_name }} SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
