name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:

  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run dist:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set release title and notes
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ github.ref_name }} --jq .body)
          gh release edit ${{ github.ref_name }} \
            --title ${{ github.ref_name }} \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SHA256SUMS
        run: |
          mkdir artifacts
          gh release download ${{ github.ref_name }} \
            --dir artifacts \
            --pattern "*.exe" \
            --pattern "*.dmg" \
            --pattern "*.AppImage" \
            --pattern "*.tar.gz"
          sha256sum artifacts/* > SHA256SUMS
          gh release upload ${{ github.ref_name }} SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}

  update-flatpak-manifest:
    # Patches the local flatpak/ manifest with the new release URL + sha256 and pushes to main.
    # After every release, the local manifest stays current — no manual edits needed before
    # opening the initial Flathub PR or for any subsequent submission.
    # TEMPORARILY DISABLED until Flathub submission is ready. Flip `if: false` to remove.
    if: false
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Patch manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="Arroxy-${VERSION}.tar.gz"
          HASH=$(grep "$TARBALL" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $TARBALL in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          python3 - "$VERSION" "$HASH" <<'EOF'
          import re, sys
          VERSION, HASH = sys.argv[1], sys.argv[2]
          URL = f"https://github.com/antonio-orionus/Arroxy/releases/download/v{VERSION}/Arroxy-{VERSION}.tar.gz"
          with open("flatpak/io.github.antonio_orionus.Arroxy.yml") as f:
              content = f.read()
          content = re.sub(
              r"url: https://github\.com/antonio-orionus/Arroxy/releases/download/v[\d.]+/Arroxy-[\d.]+\.tar\.gz",
              f"url: {URL}",
              content,
          )
          content = re.sub(
              r"(url: https://github\.com/antonio-orionus/Arroxy/releases/download/v[\d.]+/Arroxy-[\d.]+\.tar\.gz\n        sha256: )[a-f0-9]{64}",
              rf"\g<1>{HASH}",
              content,
          )
          with open("flatpak/io.github.antonio_orionus.Arroxy.yml", "w") as f:
              f.write(content)
          EOF
          rm SHA256SUMS
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          if git diff --quiet flatpak/io.github.antonio_orionus.Arroxy.yml; then
            echo "Manifest already up to date"
            exit 0
          fi
          git add flatpak/io.github.antonio_orionus.Arroxy.yml
          git commit -m "chore: bump flatpak manifest to ${GITHUB_REF_NAME#v}"
          git push origin main

  publish-scoop:
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4
        with:
          repository: antonio-orionus/scoop-bucket
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PORTABLE="Arroxy-Portable-${VERSION}.exe"
          HASH=$(grep "$PORTABLE" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $PORTABLE in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          jq --arg v "$VERSION" --arg h "$HASH" --arg p "$PORTABLE" \
            '.version = $v
             | .url = "https://github.com/antonio-orionus/Arroxy/releases/download/v\($v)/\($p)"
             | .hash = "sha256:\($h)"
             | .bin = $p
             | .shortcuts = [[$p, "Arroxy"]]' \
            bucket/arroxy.json > bucket/arroxy.json.tmp
          mv bucket/arroxy.json.tmp bucket/arroxy.json
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          git add bucket/arroxy.json
          git commit -m "arroxy: bump to ${GITHUB_REF_NAME#v}"
          git push

  publish-flatpak:
    # Requires initial Flathub submission to be approved first (one-time manual step).
    # After approval, flathub/io.github.antonio_orionus.Arroxy is created and this job
    # becomes active. continue-on-error keeps the workflow green until then.
    # TEMPORARILY DISABLED until Flathub submission is ready. Flip `if: false` to remove.
    if: false
    needs: finalize
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Flathub manifest
        uses: actions/checkout@v4
        with:
          repository: flathub/io.github.antonio_orionus.Arroxy
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="Arroxy-${VERSION}.tar.gz"
          HASH=$(grep "$TARBALL" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $TARBALL in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          python3 - "$VERSION" "$HASH" <<'EOF'
          import re, sys
          VERSION, HASH = sys.argv[1], sys.argv[2]
          TARBALL = f"Arroxy-{VERSION}.tar.gz"
          URL = f"https://github.com/antonio-orionus/Arroxy/releases/download/v{VERSION}/{TARBALL}"
          with open("io.github.antonio_orionus.Arroxy.yml") as f:
              content = f.read()
          content = re.sub(
              r"url: https://github\.com/antonio-orionus/Arroxy/releases/download/v[\d.]+/Arroxy-[\d.]+\.tar\.gz",
              f"url: {URL}",
              content,
          )
          content = re.sub(
              r"(url: https://github\.com/antonio-orionus/Arroxy/releases/download/v[\d.]+/Arroxy-[\d.]+\.tar\.gz\n        sha256: )[a-f0-9]{64}",
              rf"\g<1>{HASH}",
              content,
          )
          with open("io.github.antonio_orionus.Arroxy.yml", "w") as f:
              f.write(content)
          EOF
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          git add io.github.antonio_orionus.Arroxy.yml
          git commit -m "arroxy: bump to ${GITHUB_REF_NAME#v}"
          git push

  publish-homebrew:
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: antonio-orionus/homebrew-arroxy
          token: ${{ secrets.WINGET_TOKEN }}
      - name: Download SHA256SUMS
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
      - name: Update cask
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="Arroxy-${VERSION}.dmg"
          HASH=$(grep "$DMG" SHA256SUMS | awk '{print $1}')
          if [ -z "$HASH" ]; then
            echo "::error::Could not find $DMG in SHA256SUMS"
            cat SHA256SUMS
            exit 1
          fi
          sed -i -E "s/version \".*\"/version \"$VERSION\"/" Casks/arroxy.rb
          sed -i -E "s/sha256 \".*\"/sha256 \"$HASH\"/" Casks/arroxy.rb
      - name: Commit & push
        run: |
          git config user.name "arroxy-release-bot"
          git config user.email "release@arroxy.local"
          git add Casks/arroxy.rb
          git commit -m "arroxy: bump to ${GITHUB_REF_NAME#v}"
          git push
