name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Knip
        run: bun run knip

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  landing:
    name: Landing page is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate landing pages
        run: node landing-src/build.mjs

      - name: Verify docs/ matches landing-src/
        run: |
          if ! git diff --quiet -- docs/; then
            echo "::error::docs/ is out of sync with landing-src/. Run 'npm run build:landing' and commit the result."
            git diff --stat -- docs/
            exit 1
          fi
